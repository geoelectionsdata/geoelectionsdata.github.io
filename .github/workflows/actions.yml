name: Rebuild

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *" # daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  packages: write

jobs:
  rebuild-project:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo content
        uses: actions/checkout@v4

      # ── R setup ────────────────────────────────────────────────────────────
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true   # fast pre-built binaries

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-${{ runner.os }}-${{ hashFiles('src/loaders/*.R') }}
          restore-keys: r-${{ runner.os }}-

      - name: Install R packages
        run: |
          Rscript -e "install.packages(c('readxl', 'dplyr', 'tidyr', 'stringr',
                                         'yaml', 'openxlsx', 'jsonlite', 'sf', 'readr'),
                                        repos = 'https://cloud.r-project.org')"

      # ── Process raw election data ───────────────────────────────────────────
      # Each loader reads from src/data/raw/ and writes to src/data/results/
      # (and src/data/turnout/ where applicable). Run from project root.
      # NOTE: process_parl2016.R is a stub — will fail until implemented.
      - name: Process 2020 parliamentary data
        run: Rscript src/loaders/process_parl2020.R

      - name: Process 2024 parliamentary data
        run: Rscript src/loaders/process_parl2024.R

      - name: Process 2021 local data
        run: Rscript src/loaders/process_local2021.R

      - name: Process 2025 local data
        run: Rscript src/loaders/process_local2025.R

      - name: Process 2024 Adjara data
        run: Rscript src/loaders/process_adj2024.R

      - name: Process 2018 presidential data
        run: Rscript src/loaders/process_pres2018.R

      - name: Process 1919 parliamentary data
        run: Rscript src/loaders/process_parl1919.R

      # ── Build download bundles (xlsx per election) ─────────────────────────
      - name: Build download bundles
        run: Rscript src/loaders/build_downloads.R
        continue-on-error: true  # remove once implemented

      # ── Node / Observable build ────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
          cache-dependency-path: package-lock.json

      - name: Install Node dependencies
        run: yarn --frozen-lockfile

      - name: Build project
        run: yarn build

      - name: Copy xlsx downloads to dist
        run: |
          mkdir -p dist/data/downloads
          cp src/data/downloads/*.xlsx dist/data/downloads/ 2>/dev/null || true

      # ── Deploy ─────────────────────────────────────────────────────────────
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v3

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
