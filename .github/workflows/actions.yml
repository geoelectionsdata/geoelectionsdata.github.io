name: Rebuild

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *" # daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  packages: write

jobs:
  rebuild-project:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo content
        uses: actions/checkout@v4

      # ── R setup ────────────────────────────────────────────────────────────
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true   # fast pre-built binaries

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-${{ runner.os }}-${{ hashFiles('src/loaders/*.R') }}
          restore-keys: r-${{ runner.os }}-

      - name: Install sf system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudunits2-dev libgdal-dev libgeos-dev libproj-dev

      - name: Install R packages
        run: |
          Rscript -e "install.packages(c('readxl', 'dplyr', 'tidyr', 'stringr',
                                         'yaml', 'openxlsx', 'jsonlite', 'sf', 'readr'),
                                        repos = 'https://cloud.r-project.org')"

      # ── Process raw election data ───────────────────────────────────────────
      # Each loader reads from src/data/raw/ and writes to src/data/results/
      # (and src/data/turnout/ where applicable). Run from project root.
      - name: Process 2012 parliamentary data
        run: Rscript src/loaders/process_parl2012.R

      - name: Process 2008 parliamentary data
        run: Rscript src/loaders/process_parl2008.R

      - name: Process 2020 parliamentary data
        run: Rscript src/loaders/process_parl2020.R

      - name: Process 2024 parliamentary data
        run: Rscript src/loaders/process_parl2024.R

      - name: Process 2017 local data
        run: Rscript src/loaders/process_local2017.R

      - name: Process 2014 local data
        run: Rscript src/loaders/process_local2014.R

      - name: Process 2021 local data
        run: Rscript src/loaders/process_local2021.R

      - name: Process 2025 local data
        run: Rscript src/loaders/process_local2025.R

      - name: Process 2024 Adjara data
        run: Rscript src/loaders/process_adj2024.R

      - name: Process 2020 Adjara data
        run: Rscript src/loaders/process_adj2020.R

      - name: Process 2016 Adjara data
        run: Rscript src/loaders/process_adj2016.R

      - name: Process 2008 Adjara data
        run: Rscript src/loaders/process_adj2008.R

      - name: Process 2008 presidential data
        run: Rscript src/loaders/process_pres2008.R

      - name: Process 2018 presidential data
        run: Rscript src/loaders/process_pres2018.R

      - name: Process 1919 parliamentary data
        run: Rscript src/loaders/process_parl1919.R

      # ── Node setup for download bundle scripts and Observable build ────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Node dependencies
        run: npm ci

      # ── Build download bundles (xlsx per election) ─────────────────────────
      - name: Build pres2008 download bundle
        run: node src/loaders/downloads/process_pres2008_download.js

      - name: Build parl2008 download bundle
        run: node src/loaders/downloads/process_parl2008_download.js

      - name: Build parl2012 download bundle
        run: node src/loaders/downloads/process_parl2012_download.js

      - name: Build parl2024 download bundle
        run: node src/loaders/downloads/process_parl2024_download.js

      - name: Build local2017 download bundle
        run: node src/loaders/downloads/process_local2017_download.js

      - name: Build local2014 download bundle
        run: node src/loaders/downloads/process_local2014_download.js

      - name: Build adj2020 download bundle
        run: node src/loaders/downloads/process_adj2020_download.js

      - name: Build adj2016 download bundle
        run: node src/loaders/downloads/process_adj2016_download.js

      - name: Build adj2008 download bundle
        run: node src/loaders/downloads/process_adj2008_download.js

      - name: Update download metadata sheets
        run: node src/loaders/downloads/update_metadata.js

      # ── Node / Observable build ────────────────────────────────────────────
      - name: Build project
        run: npm run build

      - name: Copy manifest xlsx downloads to dist
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const manifest = JSON.parse(fs.readFileSync('src/data/downloads.json', 'utf8'));
          const outDir = 'dist/data/downloads';
          fs.mkdirSync(outDir, { recursive: true });

          for (const entry of manifest.files ?? []) {
            const source = path.join('src/data/downloads', entry.filename);
            if (!fs.existsSync(source)) {
              throw new Error(`Download file listed in manifest is missing: ${source}`);
            }
            fs.copyFileSync(source, path.join(outDir, entry.filename));
          }
          NODE

      # ── Deploy ─────────────────────────────────────────────────────────────
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v3

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
