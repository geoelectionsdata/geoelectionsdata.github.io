<div class="app-header">

  <div class="app-brand">
    <a href="./" data-nav="nav.brand">Elections in Georgia</a>
  </div>

  <div style="display: flex; align-items: center; gap: 0.75rem;">
    <nav class="top-nav">
      <h2><a href="./"           data-nav="nav.main">Main</a></h2>
      <h2><a href="./elections"  data-nav="nav.elections">Elections</a></h2>
      <h2><a href="./candidates" data-nav="nav.candidates">Candidates</a></h2>
      <h2><a href="./downloads"  data-nav="nav.data">Data</a></h2>
      <!-- <h2><a href="./analysis"   data-nav="nav.analysis">Analysis</a></h2> -->
      <h2><a href="./about"      data-nav="nav.about">About</a></h2>
    </nav>

    <button id="lang-toggle" class="lang-btn" aria-label="Switch Language"></button>

    <button class="menu-toggle" aria-label="Toggle navigation">
      <svg viewBox="0 0 24 24">
        <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
      </svg>
    </button>
  </div>

</div>

<script>
(function() {
  // --- i18n dictionary ---
  const navDict = {
    "en": {
      "nav.brand":      "ELECTIONS DATA ARCHIVE OF GEORGIA",
      "nav.main":       "MAIN",
      "nav.elections":  "ELECTIONS",
      "nav.candidates": "CANDIDATES",
      "nav.data":       "DATA",
      "nav.analysis":   "ANALYSIS",
      "nav.about":      "ABOUT"
    },
    "ka": {
      "nav.brand":      "საქართველოს არჩევნების მონაცემთა არქივი",
      "nav.main":       "მთავარი",
      "nav.elections":  "არჩევნები",
      "nav.candidates": "კანდიდატები",
      "nav.data":       "მონაცემები",
      "nav.analysis":   "ანალიზი",
      "nav.about":      "პროექტის შესახებ"
    }
  };

  // --- Update text ---
  let sharedDict = null;
  async function loadSharedDict() {
    if (sharedDict) return sharedDict;
    try {
      const response = await fetch(new URL("./data/config/translations.json", document.baseURI));
      if (response.ok) sharedDict = await response.json();
    } catch (_) {
      sharedDict = null;
    }
    return sharedDict;
  }

  function applyLabels(lang, labels) {
    document.querySelectorAll("[data-nav]").forEach(el => {
      const key = el.getAttribute("data-nav");
      if (labels?.[key]) el.innerText = labels[key];
    });
    const langBtn = document.getElementById("lang-toggle");
    if (langBtn) langBtn.setAttribute("aria-label", labels?.["nav.switch_language"] || "Switch language");
    const menuBtn = document.querySelector(".menu-toggle");
    if (menuBtn) menuBtn.setAttribute("aria-label", labels?.["nav.toggle_navigation"] || "Toggle navigation");
    const btn = document.getElementById("lang-toggle");
    if (btn) btn.innerHTML = lang === "en" ? "🇬🇪 ქარ" : "🇬🇧 Eng";
  }

  async function updateUI(lang) {
    applyLabels(lang, navDict[lang] || navDict.en);
    const dict = await loadSharedDict();
    applyLabels(lang, dict?.[lang] || navDict[lang] || navDict.en);
  }

  // --- Active nav link ---
  function setActiveLink() {
    const path = window.location.pathname;
    document.querySelectorAll(".top-nav a").forEach(link => {
      link.classList.remove("active");
      // Resolve relative href to absolute path for comparison
      const resolved = new URL(link.getAttribute("href"), window.location.href).pathname;
      // Normalize: strip trailing slash
      const norm = p => p.replace(/\/+$/, "") || "/";
      if (norm(path) === norm(resolved)) {
        link.classList.add("active");
      }
    });
  }

  // --- Init ---
  const currentLang = localStorage.getItem("app_lang") || "ka";
  updateUI(currentLang);
  setActiveLink();

  // --- Language toggle ---
  const langBtn = document.getElementById("lang-toggle");
  if (langBtn) {
    langBtn.addEventListener("click", () => {
      const oldLang = localStorage.getItem("app_lang") || "ka";
      const newLang = oldLang === "ka" ? "en" : "ka";
      localStorage.setItem("app_lang", newLang);
      updateUI(newLang);
      window.dispatchEvent(new CustomEvent("lang-change", { detail: newLang }));
    });
  }

  // --- Mobile menu toggle ---
  const toggle = document.querySelector(".menu-toggle");
  const nav    = document.querySelector(".top-nav");
  if (toggle && nav) {
    toggle.addEventListener("click", () => nav.classList.toggle("open"));
    // Close menu when a link is clicked
    nav.querySelectorAll("a").forEach(a =>
      a.addEventListener("click", () => nav.classList.remove("open"))
    );
  }
})();
</script>
