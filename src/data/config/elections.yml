# Georgia Elections Configuration
# sub_type: pr | mixed | messy  (parliamentary only)
# threshold_status: passed | failed | notrun

elections:

  - id: parl_2024
    type: parliamentary
    sub_type: pr
    date: "2024-10-26"
    name:
      en: "2024 Parliamentary Elections"
      ka: "2024 წლის საპარლამენტო არჩევნები"
    system:
      pr:
        enabled: true
        seats: 150
        shape_file: "data/shp/parl2024_pr.geojson"
        precinct_shape_file: "data/shp/parl2024_pr_precincts.geojson"
      smd:
        enabled: false
        seats: 0
        shape_file: null
      compensation:
        enabled: false
        shape_file: null
    sub_elections: []
    parties:
      - id: gd
        threshold_status: passed
      - id: coalition_for_change
        threshold_status: passed
      - id: unity
        threshold_status: passed
      - id: strong_georgia
        threshold_status: passed
      - id: girchi
        threshold_status: failed
      - id: other
        threshold_status: failed
    files:
      pr_results:          "data/results/parl2024_pr.csv"
      pr_precinct_results: "data/results/parl2024_pr_precincts.csv"
      smd_results:         null
      candidates:          "data/candidates/parl2024.csv"
      cartogram:           "data/shp/parl2024_cartogram.geojson"
    turnout:
      available: true
      type: detailed
      file: "data/turnout/parl2024_turnout.csv"
      precinct_file: "data/turnout/parl2024_pr_precincts_turnout.csv"
      has_snapshots: true
      has_lists: true

  - id: parl_2020
    type: parliamentary
    sub_type: mixed
    date: "2020-10-31"
    name:
      en: "2020 Parliamentary Elections"
      ka: "2020 წლის საპარლამენტო არჩევნები"
    system:
      pr:
        enabled: true
        seats: 120
        shape_file: "data/shp/parl2020_pr.geojson"
      smd:
        enabled: true
        seats: 30
        shape_file: "data/shp/parl2020_smd.geojson"
      compensation:
        enabled: false
        shape_file: null
    sub_elections:
      - id: parl_2020_runoff
        type: runoff
        date: "2020-11-21"
        name:
          en: "2020 SMD Runoff"
          ka: "2020 - მეორე ტური (მაჟ.)"
        files:
          smd_results: "data/results/parl2020_smd_runoff.csv"
      - id: parl_2020_by_tbilisi
        type: by_election
        date: "2021-10-02"
        name:
          en: "2021 Tbilisi By-election"
          ka: "2021 - თბილისი (დამატებითი)"
        files:
          smd_results: "data/results/parl2020_by_tbilisi.csv"
    parties:
      - id: gd
        threshold_status: passed
      - id: unm
        threshold_status: passed
      - id: european_georgia
        threshold_status: passed
      - id: girchi
        threshold_status: passed
      - id: labour
        threshold_status: passed
      - id: other
        threshold_status: failed
    files:
      pr_results:  "data/results/parl2020_pr.csv"
      smd_results: "data/results/parl2020_smd.csv"
      candidates:  "data/candidates/parl2020.csv"
      cartogram:   "data/shp/parl2020_cartogram.geojson"
    turnout:
      available: true
      type: basic
      file: "data/turnout/parl2020_turnout.csv"
      precinct_file: null
      has_snapshots: false
      has_lists: false

