# Party registry
# Each party has a canonical id, name, default color, and type.
# Election-specific aliases and color overrides are defined in election YAMLs.

parties:

  # ── 2024 parliamentary election parties ──────────────────────────────────

  - id: unity_development
    name:
      en: Party of Unity and Development
      ka: საქართველოს ერთობისა და განვითარების პარტია
    color: "#546E7A"
    type: party

  - id: european_democrats
    name:
      en: European Democrats
      ka: ევროპელი დემოკრატები
    color: "#0288D1"
    type: party

  - id: patriots
    name:
      en: Alliance of Patriots of Georgia
      ka: საქართველოს პატრიოტთა ალიანსი
    color: "#880E4F"
    type: party

  - id: our_georgia
    name:
      en: Our United Georgia
      ka: ჩვენი გაერთიანებული საქართველო
    color: "#2E7D32"
    type: party

  - id: change_georgia
    name:
      en: Change Georgia
      ka: შეცვალე საქართველო
