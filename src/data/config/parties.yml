# Party registry
# Each party has a canonical id, name, default color, and type.
# Election-specific aliases and color overrides are defined in election YAMLs.
#
# Optional fields used by the /parties page:
#   category   — explicit categorisation for the page's filter chips.
#                Values: party | coalition | historic | independent | option | other
#                Only `party`, `coalition`, `historic` get their own filter chip;
#                the others fall under "All" only. If omitted, the loader infers:
#                type=bloc|alliance → coalition; type=independent → independent;
#                type=option → option; otherwise → party.
#   lineage    — string key grouping multiple party_ids that belong to the same
#                continuous political identity (e.g. greens / greens_geo / greens_2014).
#                Parties sharing a lineage collapse into one row on the /parties
#                page. Default = the party's own id (= no grouping).
#   logo       — path to a static logo asset (reserved; left null until logos exist).

