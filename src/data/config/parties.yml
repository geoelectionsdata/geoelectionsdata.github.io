    color: "#00695C"
    type: party

  - id: tribuna
    name:
      en: Tribuna
      ka: ტრიბუნა
    color: "#4A148C"
    type: party

  - id: chven
    name:
      en: We
      ka: ჩვენ
    color: "#AD1457"
    type: party

  - id: gakharia
    name:
      en: For Georgia
      ka: გახარია საქართველოსთვის
