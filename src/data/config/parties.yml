# Party registry — colors are keyed by election ID
# Use hex colors. "default" is fallback for any election not listed.
# Hues of the same color are used for choropleth intensity.

parties:

  # --- Post-2012 parties ---

  - id: gd
    name:
      en: Georgian Dream
      ka: ქართული ოცნება
    colors:
      parl_2024: "#1565C0"
      parl_2020: "#1976D2"
      default:   "#1976D2"

  - id: unm
    name:
      en: United National Movement
      ka: ერთიანი ნაციონალური მოძრაობა
