id: parl_2020
type: parliamentary
sub_type: mixed
date: "2020-10-31"
name:
  en: "October 31, 2020 elections to the Parliament of Georgia"
  ka: "საქართველოს პარლამენტის 2020 წლის 31 ოქტომბრის არჩევნები"

system:
  pr:
    enabled: true
    seats: 120
    threshold_pct: 1.0
    method: dhondt
    shape_file: "data/shp/parl2024_pr.geojson"
    precinct_shape_file: "data/shp/parl2020_pr_precincts.geojson"
  smd:
    enabled: true
    seats: 30
    shape_file: "data/shp/parl2020_smd.geojson"
    precinct_shape_file: "data/shp/parl2020_pr_precincts.geojson"
  compensation:
    enabled: false
    shape_file: null

map_view:
  center: [42.1, 43.5]
  zoom: 7
  default_level: district
  default_vote_type: pr

notes:
  en: |
    The 2020 parliamentary elections were held under a reduced 1% proportional threshold and consolidated majoritarian districts. On November 21, 2020, a second round was held in 17 majoritarian electoral districts; however, the opposition candidates who advanced to the second round boycotted the elections. As a result, "Georgian Dream" obtained a simple majority in the parliament. Opposition parties initially disputed the results and refused to enter the parliament, but the boycott ended after an agreement was reached through the mediation of European Council President Charles Michel in April 2021.
  ka: |
    2020 წლის საპარლამენტო ჩატარდა შემცირებული 1%-იანი პროპორციული ბარიერისა და გამსხვილებული მაჟორიტარული ოლქების პირობებში.  2020 წლის 21 ნოემბერს 17 მაჟორიტარულ საარჩევნო ოლქში მეორე ტური გაიმართა, თუმცა მეორე ტურში გასულმა ოპოზიციურმა კანდიდატებმა არჩევნებს ბოიკოტი გამოუცხდეს. შედეგად, „ქართულმა ოცნებამ" პარლამენტში უბრალო უმრავლესობა მოიპოვა. ოპოზიციური პარტიები თავდაპირველად სადავოდ ხდიდნენ შედეგებს და უარს ამბობდნენ პარლამენტში შესვლაზე, თუმცა 2021 წლის აპრილში ევროკავშირის საბჭოს პრეზიდენტ შარლ მიშელის მიერ შუამავლობით მიღწეული შეთანხმების შემდეგ, ბოიკოტი დასრულდა.

sub_elections:
  - id: parl_2020_r2
    type: runoff
    name:
      en: Second Round (November 21, 2020)
      ka: მეორე ტური (2020 წლის 21 ნოემბერი)
    files:
      smd_results:          "data/results/parl2020_smd_runoff.csv"
      smd_precinct_results: "data/results/parl2020_smd_runoff_precincts.csv"
    notes:
      en: The second round of the 2020 parliamentary elections was held on November 21, 2020, with opposition candidates boycotting the elections.
      ka: არჩევნების მეორე ტურს რომელიც 2020 წლის 21 ნოემბერს გაიმართა, ოპოზიციურმა კანდიდატებმა ბოიკოტი გამოუცხდეს.

# threshold_status is official — not calculated from vote_share.
# alias overrides the canonical party name from parties.yml for this election.
# Parties listed in descending order of national PR vote share.
parties:
