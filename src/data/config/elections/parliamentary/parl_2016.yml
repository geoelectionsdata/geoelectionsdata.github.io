id: parl_2016
type: parliamentary
sub_type: mixed
date: "2016-10-08"
name:
  en: "October 8, 2016 elections to the Parliament of Georgia"
  ka: "საქართველოს პარლამენტის 2016 წლის 8 ოქტომბრის არჩევნები"

system:
  pr:
    enabled: true
    seats: 77
    threshold_pct: 5.0
    method: dhondt
    shape_file: "data/shp/parl2024_pr.geojson"
    precinct_shape_file: "data/shp/parl2016_pr_precincts.geojson"
  smd:
    enabled: true
    seats: 73
    shape_file: "data/shp/parl2016_smd.geojson"
    precinct_shape_file: "data/shp/parl2016_pr_precincts.geojson"
  compensation:
    enabled: false
    shape_file: null

map_view:
  center: [42.1, 43.5]
  zoom: 7

notes:
  en: |
    The 2016 parliamentary elections were held under Georgia's mixed electoral system: 77 seats were distributed proportionally (5% threshold) and 73 seats were filled through single-mandate majoritarian districts. Оnly Georgian Dream, the United National Movement, and the Alliance of Patriots crossed the threshold. A second round of majoritarian elections was held on October 30, 2016, in 45 districts where no candidate received a majority in the first round. Georgian Dream, following the victory in elections, was able to garner constitutional majority.
  ka: |
    2016 წლის საპარლამენტო არჩევნები გაიმართა შერეული საარჩევნო სისტემის პირობებში: 77 მანდატი განაწილდა პროპორციული წარმომადგენლობის წესით, 5%-იანი ბარიერის პირობებში, ხოლო 73 მანდატი — ერთმანდატიანი მაჟორიტარული ოლქების მეშვეობით. 5%-იანი ზღვარი მხოლოდ სამმა პარტიამ - „ქართულმა ოცნებამ“, „ერთიანმა ნაციონალურმა მოძრაობამ“ და „საქართველოს პატრიოტთა ალიანსმა“ გადალახეს. 2016 წლის 30 ოქტომბერს გაიმართა იმ 45 მაჟორიტარულ ოლქებში, სადაც პირველ ტურში გამარჯვებული ვერ გამოვლინდა. არჩევნებში გამარჯვებულმა „ქართულმა ოცნებამ“ საკონსტიტუციო უმრავლესობა მოიპოვა.

sub_elections:
  - id: parl_2016_r2
    type: runoff
    name:
      en: Second Round (October 30, 2016)
      ka: მეორე ტური (2016 წლის 30 ოქტომბერი)
    files:
      smd_results:          "data/results/parl2016_smd_runoff.csv"
      smd_precinct_results: "data/results/parl2016_smd_runoff_precincts.csv"

