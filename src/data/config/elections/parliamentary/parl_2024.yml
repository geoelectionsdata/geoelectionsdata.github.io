id: parl_2024
type: parliamentary
sub_type: pr
date: "2024-10-26"
name:
  en: "2024 Parliamentary Elections"
  ka: "2024 წლის საპარლამენტო არჩევნები"
system:
  pr:
    enabled: true
    seats: 150
    threshold_pct: 5.0
    method: dhondt
    shape_file: "data/shp/parl2024_pr.geojson"
    precinct_shape_file: "data/shp/parl2024_pr_precincts.geojson"
  smd:
    enabled: false
    seats: 0
    shape_file: null
  compensation:
    enabled: false
    shape_file: null
notes:
  en: |
    2024 parliamentary elections were held on October 26. Preceded by a heated campaign and an increased anti-Western rhetoric of the ruling Georgian Dream party, it featured a 5% electoral threshold for political parties. First time in history, voting machines were used in national elections, leading to allegations of vote rigging. As a result, oppositional political parties refused to recognize its results, and some refused to take up mandates. OSCE ODIHR's <a href="https://odihr.osce.org/odihr/elections/georgia/584029">observation mission final report</a> indicated repeated problems regarding vote secrecy, procedural inconsistencies, intimidation and pressure on voters.
  ka: |
    2024 წლის საპარლამენტო არჩევნები 26 ოქტომბერს ჩატარდა. მას წინ უძღოდა დაძაბული კამპანია და მმართველი „ქართული ოცნების" მხრიდან გააქტიურებული ანტიდასავლური რიტორიკა. დაწესდა 5%-იანი საარჩევნო ბარიერი. პირველად ისტორიაში, საყოველთაო არჩევნებში ამომრჩევლებს ხმის მიცემა ელექტრონული აპარატებით შეეძლოთ, თუმცა ამასთან დაკავშირებით, წარმოიშვა ბრალდებები გაყალბების შესახებ. შედეგად, ოპოზიციურმა პოლიტიკურმა პარტიებმა არ აღიარეს არჩევნების შედეგები და უმრავლესობამ საპარლამენტო მანდატებზე უარი თქვეს. ეუთო-ს <a href="https://odihr.osce.org/odihr/elections/georgia/584029">სადამკვირვებლო მისიის საბოლოო ანგარიში</a> მიუთითებს ხმის მიცემის ფარულობის მრავალჯერად დარღვევებზე, პროცედურულ არათანმიმდევრულობაზე და ამომრჩევლებზე ზეწოლაზე.
sub_elections: []

