id: adj_2016
type: adjara
sub_type: mixed
date: "2016-10-08"
name:
  en: "October 8, 2016 elections to the Supreme Council of the Autonomous Republic of Adjara"
  ka: "აჭარის ავტონომიური რესპუბლიკის უმაღლესი საბჭოს 2016 წლის 8 ოქტომბრის არჩევნები"

system:
  pr:
    enabled: true
    seats: 15
    threshold_pct: 5.0
    method: dhondt
    shape_file: "data/shp/adj2024_pr.geojson"
    precinct_shape_file: "data/shp/adj2016_pr_precincts.geojson"
  smd:
    enabled: true
    seats: 6
    shape_file: "data/shp/adj2016_smd.geojson"
    precinct_shape_file: "data/shp/adj2016_pr_precincts.geojson"
  compensation:
    enabled: false
    shape_file: null

map_view:
  center: [41.7225389, 42.1149651]
  zoom: 9

notes:
  en: |
    The 2016 elections to the Supreme Council of Adjara were held in parallel with the 2016 parliamentary elections. Members were elected through proportional lists and six single-member majoritarian districts. A second round was held for the majoritarian races.
  ka: |
    აჭარის უმაღლესი საბჭოს 2016 წლის არჩევნები 2016 წლის საპარლამენტო არჩევნების პარალელურად გაიმართა. წევრები აირჩიეს პროპორციული სიებით და ექვსი მაჟორიტარული ოლქით. მაჟორიტარულ ოლქებში გაიმართა მეორე ტური.

sub_elections:
  - id: adj_2016_smd_runoff
    type: runoff
    name:
      en: "Second Round (October 30, 2016)"
      ka: "მეორე ტური (2016 წლის 30 ოქტომბერი)"
    files:
      smd_results:          "data/results/adj2016_smd_runoff.csv"
      smd_precinct_results: "data/results/adj2016_smd_runoff_precincts.csv"

