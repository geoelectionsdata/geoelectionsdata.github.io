id: adj_2020
type: adjara
sub_type: mixed
date: "2020-10-31"
name:
  en: "October 31, 2020 elections to the Supreme Council of the Autonomous Republic of Adjara"
  ka: "აჭარის ავტონომიური რესპუბლიკის უმაღლესი საბჭოს 2020 წლის 31 ოქტომბრის არჩევნები"

system:
  pr:
    enabled: true
    seats: 18
    threshold_pct: 1.0
    method: dhondt
    shape_file: "data/shp/adj2024_pr.geojson"
    precinct_shape_file: "data/shp/adj2020_pr_precincts.geojson"
  smd:
    enabled: true
    seats: 3
    shape_file: "data/shp/adj2020_smd.geojson"
    precinct_shape_file: "data/shp/adj2020_pr_precincts.geojson"
  compensation:
    enabled: false
    shape_file: null

map_view:
  center: [41.7225389, 42.1149651]
  zoom: 9
  default_level: district
  default_vote_type: pr

notes:
  en: |
    The 2020 elections to the Supreme Council of Adjara were held in parallel with the 2020 parliamentary elections. Members were elected through proportional lists and three single-member majoritarian districts. Majoritarian races in Batumi and the Khelvachauri-Keda-Shuakhevi-Khulo district went to a runoff; Kobuleti-Khelvachauri was decided in the first round.
  ka: |
    აჭარის უმაღლესი საბჭოს 2020 წლის არჩევნები 2020 წლის საპარლამენტო არჩევნების პარალელურად გაიმართა. წევრები აირჩიეს პროპორციული სიებით და სამი მაჟორიტარული ოლქით. ბათუმისა და ხელვაჩაური-ქედა-შუახევი-ხულოს მაჟორიტარულ ოლქებში გაიმართა მეორე ტური; ქობულეთი-ხელვაჩაურის ოლქში გამარჯვებული პირველივე ტურში გამოვლინდა.

sub_elections:
  - id: adj_2020_smd_runoff
    type: runoff
    name:
      en: "Second Round (November 21, 2020)"
      ka: "მეორე ტური (2020 წლის 21 ნოემბერი)"
    files:
      smd_results:          "data/results/adj2020_smd_runoff.csv"
      smd_precinct_results: "data/results/adj2020_smd_runoff_precincts.csv"

