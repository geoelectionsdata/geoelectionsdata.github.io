download_name:
  en: "2013 Presidential Election"
name:
  en: "October 27, 2013 Elections of the President of Georgia"
  ka: "საქართველოს პრეზიდენტის 2013 წლის 27 ოქტომბრის არჩევნები"

system:
  pr:
    enabled: true
    shape_file: "data/shp/parl2024_pr.geojson"
