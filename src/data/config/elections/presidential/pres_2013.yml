  smd:
    enabled: false
  compensation:
    enabled: false

map_view:
  center: [42.1, 43.5]
  zoom: 7

notes:
  en: |
    The October 27, 2013 presidential election was a direct nationwide vote and was decided in one round. These were first presidential elections following the constitional amendments according to which, the country shifted towards parliamentary model, with its president only holding a nominal power.
  ka: |
    2013 წლის 27 ოქტომბრის საპრეზიდენტო არჩევნები პირდაპირი საყოველთაო კენჭისყრით გაიმართა და გამარჯვებული ერთ ტურში გამოვლინდა. ეს გახლდათ პრეზიდენტის პირველი არჩევნები იმ საკონსტიტუციო ცვლილებების შემდგომ, რომლის თანახმადაც, ქვეყანა საპარლამენტო მმართველობაზე გადავიდა, პრეზიდენტს კი დიდწილად, მხოლოდ სიმბოლური ძალაუფლება დარჩა.

