id: local_2021
type: local
date: "2021-10-02"
name:
  en: "2021 elections of municipal authorities"
  ka: "მუნიციპალიტეტის ორგანოთა 2021 წლის არჩევნები"
notes:
  en: |
    First elections after the April 2021 Charles Michel agreement. Political parties agreed on a provisional 43% threshold for the Georgian Dream to trigger early parliamentary elections. Mayor and Sakrebulo majoritarian
    contests in some municipalities proceeded to a second round.
  ka: |
    პირველი არჩევნები 2021 წლის აპრილის შარლ მიშელის შეთანხმების შემდეგ. პოლიტიკური პარტიები შეთანხმდნენ შუალედურ 43%-იან ბარიერზე, „ქართული ოცნების მხრიდან“ რომლის ვერგადალახვის შემთხვევაში, დაინიშნებოდა რიგგარეშე საპარლამენტო არჩევნები. ზოგიერთ მუნიციპალიტეტში, მერისა და საკრებულოს მაჟორიტარი კანდიდატების არჩევნებში გამარჯვებულის გამოსავლენად, მეორე ტური გახდა საჭირო.

# ── Electoral system ──────────────────────────────────────────────────────
system:
  pr:
    enabled: true
    seats: 0                        # varies by municipality
    threshold_pct: 3.0              # 3% threshold in 2021
    method: dhondt
    shape_file: "data/shp/parl2024_pr.geojson"
    selfgov_shape_file: "data/shp/selfgov_areas_2025.geojson"
    precinct_shape_file: "data/shp/local2021_precincts.geojson"
  smd:
    enabled: true
    seats: 64                       # 64 self-governing units in 2021
    shape_file: "data/shp/selfgov_areas_2025.geojson"
    precinct_shape_file: "data/shp/local2021_precincts.geojson"
  compensation:
    enabled: false
    shape_file: null

# ── Council (Sakrebulo majoritarian) ─────────────────────────────────────
council:
  total_pr_seats: 0
  total_smd_seats: 0
  shape_file: "data/shp/majoritarian_2021_major_id.geojson"

sub_elections:
  - id: local_2021_r2
    type: runoff
    name:
      en: Second Round
      ka: მეორე ტური
    files:
      smd_results:                  "data/results/local2021_r2_smd.csv"
      smd_precinct_results:         "data/results/local2021_r2_smd_precincts.csv"
      council_smd_results:          "data/results/local2021_r2_council_smd.csv"
      council_smd_precinct_results: "data/results/local2021_r2_council_smd_precincts.csv"

# ── Party metadata ────────────────────────────────────────────────────────
# threshold_status reflects the national 3% Sakrebulo PR threshold.
parties:
  - id: gd
    threshold_status: passed
    alias:
      ka: ქართული ოცნება - დემოკრატიული საქართველო
  - id: unm
    threshold_status: passed
  - id: lelo
    threshold_status: passed
  - id: european_georgia
    threshold_status: passed
    alias:
      ka: ევროპული საქართველო-მოძრაობა თავისუფლებისთვის
  - id: gakharia
    threshold_status: passed
  - id: girchi
    threshold_status: failed
  - id: girchi_more_freedom
    threshold_status: passed
    alias:
      ka: "ზურაბ გირჩი ჯაფარიძე: გირჩი - მეტი თავისუფლება"
  - id: citizens
    threshold_status: failed
    alias:
      ka: ალეკო ელისაშვილი-მოქალაქეები
  - id: droa
    threshold_status: failed
    alias:
      ka: ელენე ხოშტარია - დროა
  - id: early_elections_coalition
    threshold_status: failed
  - id: patriots
    threshold_status: passed
    alias:
      ka: დავით თარხან-მოურავი, ირმა ინაშვილი - საქართველოს პატრიოტთა ალიანსი
      en: Davit Tarkhan-Mouravi, Irma Inashvili - Alliance of Patriots of Georgia
  - id: labour
    threshold_status: passed
    alias:
      ka: შალვა ნათელაშვილი-საქართველოს ლეიბორისტული პარტია
      en: Shalva Natelashvili-Labour Party of Georgia
  - id: left_alliance
    threshold_status: failed
  - id: third_force
    threshold_status: passed
  - id: european_democrats
    threshold_status: failed
  - id: law_justice
    threshold_status: failed
  - id: new_christian_democrats
    threshold_status: failed
    alias:
      ka: გოგი წულაია - ახალი ქრისტიანდემოკრატები
      en: Gogi Tsulaia - New Christian Democrats
  - id: reformer
    threshold_status: failed
  - id: georgian_group
    threshold_status: failed
    alias:
      ka: ჯონდი ბაღათურია-ქართული დასი
  - id: european_socialists
    threshold_status: failed
  - id: progress_freedom
    threshold_status: failed
  - id: development_party
    threshold_status: failed
  - id: social_democrats
    threshold_status: failed
  - id: free_choice
    threshold_status: failed
  - id: social_justice
    threshold_status: failed
    alias:
      ka: მამუკა ტუსკაძე-სოციალური სამართლიანობისათვის
  - id: workers_socialist
    threshold_status: failed
  - id: nation_party
    threshold_status: failed
    alias:
      ka: ერი - მირიან მირიანაშვილი
  - id: tribuna
    threshold_status: failed
    alias:
      ka: დავით ჭიჭინაძე - ტრიბუნა
  - id: free_georgia
    threshold_status: failed
    alias:
      ka: თავისუფალი საქართველო (ზაზა ხატიაშვილი, კახა კუკავა,გრიგოლ ჯოჯუა)
  - id: mechiauri_united
    threshold_status: failed
    alias:
      ka: თამაზ მეჭიაური ერთიანი საქართველოსთვის
  - id: freedom_gamsakhurdia
    threshold_status: failed
  - id: face_plus
    threshold_status: failed
  - id: democrats_alliance
    threshold_status: failed
  - id: third_way
    threshold_status: failed
  - id: peoples_party
    threshold_status: failed
  - id: for_people
    threshold_status: failed
    alias:
      ka: ანა დოლიძე - ხალხისთვის
  - id: reformators
    threshold_status: failed
  - id: greens_geo
    threshold_status: failed
    alias:
      ka: გაჩეჩილაძე - მწვანეთა პარტია
  - id: georgia_party
    threshold_status: failed

# ── Data files ────────────────────────────────────────────────────────────
sources:
  - name:
      en: "Freedom of Information (FOI) request from the Central Elections Commission of Georgia"
      ka: "ცენტრალური საარჩევნო კომისიიდან გამოთხოვნილი საჯარო ინფორმაცია"

files:
  seats:                        "data/results/local2021_seats.csv"
  pr_results:                   "data/results/local2021_pr.csv"
  pr_selfgov_results:           "data/results/local2021_pr_selfgov.csv"
  pr_precinct_results:          "data/results/local2021_pr_precincts.csv"
  smd_results:                  "data/results/local2021_smd.csv"
  smd_district_results:         "data/results/local2021_smd_districts.csv"
  smd_precinct_results:         "data/results/local2021_smd_precincts.csv"
  council_smd_results:          "data/results/local2021_council_smd.csv"
  council_smd_precinct_results: "data/results/local2021_council_smd_precincts.csv"
  council_pr_results:           "data/results/local2021_pr.csv"
  council_pr_precinct_results:  "data/results/local2021_pr_precincts.csv"
  candidates:                   "data/config/candidates/local/local_2021.yml"

# ── Turnout metadata ──────────────────────────────────────────────────────
turnout:
  available: true
  type: basic
  file: null
  precinct_file: null
  has_snapshots: true    # voted_noon / voted_5pm columns present in CSVs
  has_lists: false
