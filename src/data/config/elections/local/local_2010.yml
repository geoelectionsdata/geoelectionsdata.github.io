id: local_2010
type: local
date: "2010-05-30"
download_name:
  en: "2010_Local_Elections"
name:
  en: "2010 elections of municipal authorities"
  ka: "მუნიციპალიტეტის ორგანოთა 2010 წლის არჩევნები"

notes:
  en: |
    The 2010 local elections included Sakrebulo proportional contests and Sakrebulo single-member district contests across self-governing units. Direct mayoral voting was held only in Tbilisi.
  ka: |
    2010 წლის ადგილობრივი თვითმმართველობის არჩევნებში ამომრჩევლები ირჩევდნენ საკრებულოს პროპორციული სიებით და საკრებულოს მაჟორიტარ წევრებს. მერის პირდაპირი არჩევნები მხოლოდ თბილისში გაიმართა.

system:
  pr:
    enabled: true
    seats: 0
    threshold_pct: 4.0
    method: dhondt
