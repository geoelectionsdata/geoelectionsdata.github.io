id: local_2014
type: local
date: "2014-06-15"
name:
  en: "2014 elections of municipal authorities"
  ka: "მუნიციპალიტეტის ორგანოთა 2014 წლის არჩევნები"

notes:
  en: |
    The 2014 local elections used the standard local-election structure: Sakrebulo proportional lists, Sakrebulo single-member districts, and directly elected mayors or gamgebelis. As the result of the local self-government reform, Ozurgeti, Zugdidi, Ambrolauri, Gori, Akhaltsikhe, Telavi and Mtskheta became their own municipalities. In a number of races, runoff elections were held.
  ka: |
    2014 წლის ადგილობრივი თვითმმართველობის არჩევნებში ამომრჩევლები ირჩევდნენ საკრებულოს პროპორციული სიებით, საკრებულოს მაჟორიტარ წევრებს და მერებს ან გამგებლებს. რეფორმის შედეგად, ქალაქები ოზურგეთი, ზუგდიდი, ამბროლაური, გორი, ახალციხე, თელავი და მცხეთა ცალკე თვითმმართველ ერთეულად ჩამოყალიბდნენ. რიგ ქალაქის მერისა და გამგებლის არჩევნებში დაინიშნა მეორე ტური.

