id: local_2025
type: local
date: "2025-04-12"
name:
  en: "2025 elections of municipal authorities"
  ka: "მუნიციპალიტეტის ორგანოთა 2025 წლის არჩევნები"
system:
  pr:
    enabled: true
    seats: 0
    threshold_pct: 4.0
    method: dhondt
    shape_file: "data/shp/parl2024_pr.geojson"
    selfgov_shape_file: "data/shp/selfgov_areas_2025.geojson"
    precinct_shape_file: "data/shp/local2025_precincts.geojson"
  smd:
    enabled: true
    seats: 66
    shape_file: "data/shp/selfgov_areas_2025.geojson"
    precinct_shape_file: "data/shp/local2025_precincts.geojson"
  compensation:
    enabled: false
    shape_file: null

map_view:
  default_level: selfgov
  default_vote_type: pr

sub_elections: []
notes:
  en: |
    2025 local elections were boycotted by major opposition political parties. It had the lowest turnout and the highest share of invalid ballots registered in history. No international monitoring missions were invited to attend elections.
  ka: |
    2025 წლის ადგილობრივ არჩევნებს მთავარმა ოპოზიციურმა პარტიებმა ბოიკოტი გამოუცხადეს. დაფიქსირდა ისტორიაში ყველაზე დაბალი საარჩევნო აქტივობა და ბათილი ბიულეტენების ყველაზე მაღალი წილი. არჩევნებზე საერთაშორისო მონიტორინგის მისიები არ მოუწვევიათ.
council:
  total_pr_seats: 0
  total_smd_seats: 0
  shape_file: "data/shp/majoritarian_2025_major_id.geojson"

# threshold_status reflects national 4% sakrebulo PR threshold.
parties:
  - id: gd
    threshold_status: passed
  - id: strong_georgia
    threshold_status: passed
  - id: gakharia
    threshold_status: passed
  - id: girchi
    threshold_status: passed
  - id: conservatives_geo
    threshold_status: passed
  - id: patriots
    threshold_status: passed
  - id: mamuli_ena
    threshold_status: failed
  - id: our_georgia
    threshold_status: failed
  - id: free_georgia
    threshold_status: failed
  - id: peoples_power
    threshold_status: failed
  - id: greens_geo
    threshold_status: failed
  - id: georgia_party
    threshold_status: failed

sources:
  - name:
      en: "Freedom of Information (FOI) request from the Central Elections Commission of Georgia"
      ka: "ცენტრალური საარჩევნო კომისიიდან გამოთხოვნილი საჯარო ინფორმაცია"

files:
  seats:                        "data/results/local2025_seats.csv"
  pr_results:                   "data/results/local2025_pr.csv"
  pr_selfgov_results:           "data/results/local2025_pr_selfgov.csv"
  pr_precinct_results:          "data/results/local2025_pr_precincts.csv"
  smd_results:                  "data/results/local2025_smd.csv"
  smd_district_results:         "data/results/local2025_smd_districts.csv"
  smd_precinct_results:         "data/results/local2025_smd_precincts.csv"
  council_smd_results:          "data/results/local2025_council_smd.csv"
  council_smd_precinct_results: "data/results/local2025_council_smd_precincts.csv"
  council_pr_results:           "data/results/local2025_pr.csv"
  council_pr_precinct_results:  "data/results/local2025_pr_precincts.csv"
  candidates:                   "data/config/candidates/local/local_2025.yml"

# Turnout is inline in each results CSV.
turnout:
  available: true
  type: basic
  file: null
  precinct_file: null
  has_snapshots: true
  has_lists: false
