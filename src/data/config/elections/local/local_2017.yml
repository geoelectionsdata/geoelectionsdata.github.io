id: local_2017
type: local
date: "2017-10-21"
name:
  en: "2017 elections of municipal authorities"
  ka: "მუნიციპალიტეტის ორგანოთა 2017 წლის არჩევნები"
notes:
  en: |
    Georgian Dream won all 64 mayoralties in the first or second round. European Georgia,
    which had split from the United National Movement earlier in 2017, competed for the
    first time. Mayor and Sakrebulo majoritarian contests in several municipalities
    proceeded to a second round held on 11 November 2017.
  ka: |
    ქართულმა ოცნებამ სრული გამარჯვება მოიპოვა — 64 მუნიციპალიტეტში მერები პირველ ან
    მეორე ტურში აირჩია. ევროპული საქართველო, რომელიც 2017 წელს გაიყო ეროვნული მოძრაობისგან,
    პირველად მონაწილეობდა ადგილობრივ არჩევნებში. ზოგიერთ მუნიციპალიტეტში მერებისა და
    საკრებულოს მაჟორიტარი კანდიდატების გამოსავლენად, 2017 წლის 11 ნოემბერს მეორე ტური
    ჩატარდა.

# ── Electoral system ──────────────────────────────────────────────────────
system:
  pr:
    enabled: true
    seats: 0                        # varies by municipality
    threshold_pct: 3.0              # 3% threshold
    method: dhondt
    shape_file: "data/shp/parl2024_pr.geojson"
    selfgov_shape_file: "data/shp/selfgov_areas_2025.geojson"
    precinct_shape_file: "data/shp/local2017_precincts.geojson"
  smd:
    enabled: true
    seats: 64                       # 64 self-governing units
    shape_file: "data/shp/selfgov_areas_2025.geojson"
    precinct_shape_file: "data/shp/local2017_precincts.geojson"
  compensation:
    enabled: false
    shape_file: null

map_view:
  default_level: selfgov
  default_vote_type: pr

# ── Council (Sakrebulo majoritarian) ─────────────────────────────────────
council:
  total_pr_seats: 0
  total_smd_seats: 0
  shape_file: "data/shp/majoritarian_2017_major_id.geojson"

sub_elections:
  - id: local_2017_r2
    type: runoff
    name:
      en: Second Round
      ka: კენჭისყრის მეორე ტური
    files:
      smd_results:                  "data/results/local2017_r2_smd.csv"
      smd_precinct_results:         "data/results/local2017_r2_smd_precincts.csv"
      council_smd_results:          "data/results/local2017_r2_council_smd.csv"
      council_smd_precinct_results: "data/results/local2017_r2_council_smd_precincts.csv"
  - id: local_2017_zugdidi_2018_sakrebulo_smd
    type: by_election
    date: "2018-05-13"
    download_key: "20180513"
    name:
      en: May 13, 2018 Zugdidi Sakrebulo by-election
      ka: 2018 წლის 13 მაისის ზუგდიდის საკრებულოს შუალედური არჩევნები
    files:
      smd_results:                  "data/results/local2017_zugdidi_2018_smd.csv"
      smd_precinct_results:         "data/results/local2017_zugdidi_2018_smd_precincts.csv"
      council_smd_results:          "data/results/local2017_zugdidi_2018_council_smd.csv"
      council_smd_precinct_results: "data/results/local2017_zugdidi_2018_council_smd_precincts.csv"
  - id: local_2017_2019_by_elections
    type: by_election
    date: "2019-05-19"
    download_key: "20190519"
    name:
      en: May 19, 2019 Local by-elections
      ka: 2019 წლის 19 მაისის ადგილობრივი შუალედური და რიგგარეშე არჩევნები
    files:
      smd_results:                  "data/results/local2017_2019_byelections_smd.csv"
      smd_precinct_results:         "data/results/local2017_2019_byelections_smd_precincts.csv"
      council_smd_results:          "data/results/local2017_2019_byelections_council_smd.csv"
      council_smd_precinct_results: "data/results/local2017_2019_byelections_council_smd_precincts.csv"
  - id: local_2017_2019_oct_sakrebulo_by_elections
    type: by_election
    date: "2019-10-27"
    download_key: "20191027"
    name:
      en: October 27, 2019 Sakrebulo by-elections
      ka: 2019 წლის 27 ოქტომბრის საკრებულოს შუალედური არჩევნები
    files:
      smd_results:                  "data/results/local2017_2019_oct_byelections_smd.csv"
      smd_precinct_results:         "data/results/local2017_2019_oct_byelections_smd_precincts.csv"
      council_smd_results:          "data/results/local2017_2019_oct_byelections_council_smd.csv"
      council_smd_precinct_results: "data/results/local2017_2019_oct_byelections_council_smd_precincts.csv"
  - id: local_2017_2020_by_elections
    type: by_election
    date: "2020-10-31"
    download_key: "20201031"
    name:
      en: October 31, 2020 local by-elections
      ka: 2020 წლის 31 ოქტომბრის ადგილობრივი შუალედური არჩევნები
    files:
      smd_results:                  "data/results/local2017_2020_byelections_smd.csv"
      smd_precinct_results:         "data/results/local2017_2020_byelections_smd_precincts.csv"
      council_smd_results:          "data/results/local2017_2020_byelections_council_smd.csv"
      council_smd_precinct_results: "data/results/local2017_2020_byelections_council_smd_precincts.csv"
  - id: local_2017_2020_by_elections_runoff
    type: runoff
    date: "2020-11-21"
    download_key: "20201121"
    name:
      en: November 21, 2020 mayoral runoff
      ka: 2020 წლის 21 ნოემბრის მერის არჩევნების მეორე ტური
    files:
      smd_results:                  "data/results/local2017_2020_byelections_smd_runoff.csv"
      smd_precinct_results:         "data/results/local2017_2020_byelections_smd_runoff_precincts.csv"
      council_smd_results:          "data/results/local2017_2020_byelections_council_smd_runoff.csv"
      council_smd_precinct_results: "data/results/local2017_2020_byelections_council_smd_runoff_precincts.csv"

